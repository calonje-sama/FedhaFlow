<!doctype html>
<html>
<head>
    <title>FedhaFlow Menu</title>
</head>
<body>
    <h1>Menu</h1>
    <a href="{{ url_for('dashboard') }}">Go to Dashboard</a>
    <form method="POST" action="{{ url_for('checkout') }}">
        <label>Phone Number:</label>
        <input type="text" name="phone" placeholder="0712345678" required><br><br>

        <label>Select Payment Method:</label>
        <select name="method">
            <option value="Cash">Cash</option>
            <option value="M-Pesa">M-Pesa</option>
        </select><br><br>

        {% for item in menu_items %}
            <input type="checkbox" name="items" value="{{ item.id }}"> {{ item.name }} - KES {{ item.price }}<br>
        {% endfor %}

        <br><button type="submit">Checkout</button>
    </form>
</body>
</html>
