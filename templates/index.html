<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FedhaFlow Landing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            height: 100vh;
            background-color: #f8f9fa;
            text-align: center;
        }
        .main-container{
            max-width: 800px;
        }
        /* Header section above cards */
        .landing-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; /* same width as main container */
        }

        .header-icon {
            width: 80px;
            height: 80px;
        }

        .header-title {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }
        .landing-card {
            width: 200px;
            height: 200px;
            margin: 20px;
            border-radius: 15px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .landing-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .landing-card img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
        }
        .landing-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="text-center main-container p-4 mt-4">
        <!-- Header section -->
        <div class="landing-header mb-4">
            <img src="https://img.icons8.com/ios-filled/100/000000/flow-chart.png" 
                 alt="App Icon" class="header-icon mb-2">
            <h1 class="header-title">FedhaFlow</h1>
        </div>

        <!-- Landing cards -->
        <div class="d-flex flex-column flex-md-row justify-content-center align-items-center">
            <div class="landing-card" onclick="location.href='{{ url_for('menu') }}'">
                <img src="https://img.icons8.com/ios-filled/100/000000/restaurant-menu.png" alt="Menu Icon">
                <div class="landing-text">Menu</div>
            </div>
            <div class="landing-card" onclick="location.href='{{ url_for('dashboard') }}'">
                <img src="https://img.icons8.com/ios-filled/100/000000/online-payment-.png" alt="Dashboard Icon">
                <div class="landing-text">Dashboard</div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS & dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
