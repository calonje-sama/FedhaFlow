<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FedhaFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .mode-banner {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 9000; text-align: center;
            font-size: .78rem; font-weight: 700;
            padding: 4px 12px; letter-spacing: .05em;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .mode-banner.sandbox { background: #fff3cd; color: #856404; border-bottom: 2px solid #ffc107; }
        .mode-banner.live    { background: #d1f0e0; color: #1e5631; border-bottom: 2px solid #1e8449; }
        .mode-banner a { color: inherit; text-decoration: underline; font-size: .75rem; }
        body {
            padding-top: 30px; font-family: 'DM Sans', sans-serif;
            background: #f4f6f9;
            display: flex; justify-content: center;
            min-height: 100vh; text-align: center;
        }
        .main-container { max-width: 860px; }
        .landing-header { display: flex; flex-direction: column; align-items: center; }
        .header-icon  { width: 80px; height: 80px; }
        .header-title { font-size: 2rem; font-weight: bold; color: #333; }
        .landing-card {
            width: 165px; height: 165px; margin: 12px;
            border-radius: 16px; background: #fff;
            box-shadow: 0 4px 12px rgba(0,0,0,.10);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: transform .2s, box-shadow .2s; cursor: pointer;
        }
        .landing-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,.16); }
        .landing-card img  { width: 65px; height: 65px; margin-bottom: 10px; }
        .landing-text { font-size: 1rem; font-weight: bold; color: #333; }
        .settings-card { border: 2px dashed #ccc; }
        .settings-card:hover { border-color: #1a5276; }
    </style>
</head>
<body>

    <!-- Mode banner -->
    <div id="mode-banner" class="mode-banner {{ 'sandbox' if mpesa_mode == 'sandbox' else 'live' }}">
        {% if mpesa_mode == 'sandbox' %}
            🧪 SANDBOX MODE — Test transactions only
        {% else %}
            🟢 LIVE MODE — Real M-Pesa transactions active
        {% endif %}
        &nbsp;·&nbsp;
        <a href="{{ url_for('settings_page') }}">⚙️ Settings</a>
    </div>

    <div class="text-center main-container p-4 mt-2">
        <div class="landing-header mb-3">
            <img src="https://img.icons8.com/ios-filled/100/000000/flow-chart.png"
                 alt="App Icon" class="header-icon mb-2">
            <h1 class="header-title">FedhaFlow</h1>
            <p class="text-muted small">Cafeteria POS &amp; Sales Manager</p>
        </div>

        <div class="d-flex flex-column flex-md-row justify-content-center align-items-center flex-wrap">
            <div class="landing-card" onclick="location.href='{{ url_for('menu') }}'">
                <img src="https://img.icons8.com/ios-filled/100/000000/restaurant-menu.png" alt="Menu">
                <div class="landing-text">Menu</div>
            </div>
            <div class="landing-card" onclick="location.href='{{ url_for('dashboard') }}'">
                <img src="https://img.icons8.com/ios-filled/100/000000/online-payment-.png" alt="Dashboard">
                <div class="landing-text">Dashboard</div>
            </div>
            <div class="landing-card" onclick="location.href='{{ url_for('reports') }}'">
                <img src="https://img.icons8.com/ios-filled/100/000000/financial-analytics.png" alt="Reports">
                <div class="landing-text">Reports</div>
            </div>
            <div class="landing-card" onclick="location.href='{{ url_for('insights') }}'">
                <img src="https://img.icons8.com/ios-filled/100/1a5276/artificial-intelligence.png" alt="Insights">
                <div class="landing-text">Insights</div>
            </div>
            <div class="landing-card settings-card" onclick="location.href='{{ url_for('settings_page') }}'">
                <img src="https://img.icons8.com/ios-filled/100/555555/settings.png" alt="Settings">
                <div class="landing-text" style="color:#555;">Settings</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
