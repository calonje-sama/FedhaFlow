<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FedhaFlow Reports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .main-container { max-width: 860px; }
        body { padding-top: 30px; font-family: 'DM Sans', sans-serif;}
        .section-card   { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 20px; margin-bottom: 20px; }
        .deduction-row  { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .deduction-row input { flex: 1; }
        .badge-saved    { font-size: .7rem; background: #d4edda; color: #155724; border-radius: 4px; padding: 2px 6px; }
        .badge-temp     { font-size: .7rem; background: #fff3cd; color: #856404; border-radius: 4px; padding: 2px 6px; }
        .preview-section { border-left: 4px solid #1a5276; padding-left: 12px; margin-bottom: 16px; }
        .profit-box      { background: #eafaf1; border-radius: 8px; padding: 14px 20px; text-align: right; }
        .profit-box.loss { background: #fdecea; }
        #loadingOverlay  {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.4); z-index: 9999;
            align-items: center; justify-content: center;
        }
        #loadingOverlay.show { display: flex; }
    </style>
</head>
<body>
{% include '_mode_banner.html' %}
<div id="loadingOverlay">
    <div class="text-white text-center">
        <div class="spinner-border mb-3" role="status"></div>
        <div>Generating PDF…</div>
    </div>
</div>

<div class="main-container mt-3 mb-5 m-auto px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="{{ url_for('home') }}" class="btn btn-secondary btn-sm">← Main Menu</a>
        <h4 class="mb-0">Reports</h4>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-sm">Dashboard</a>
    </div>

    <!-- ── Date Range ── -->
    <div class="section-card">
        <h6 class="fw-bold mb-3">📅 Date Range</h6>
        <div class="row g-2">
            <div class="col-6">
                <label class="form-label form-label-sm">From</label>
                <input type="date" id="dateFrom" class="form-control form-control-sm">
            </div>
            <div class="col-6">
                <label class="form-label form-label-sm">To</label>
                <input type="date" id="dateTo" class="form-control form-control-sm">
            </div>
        </div>
        <div class="mt-2 d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-secondary btn-sm" onclick="setRange('today')">Today</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRange('week')">This Week</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRange('month')">This Month</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="setRange('last30')">Last 30 Days</button>
        </div>
    </div>

    <!-- ── Deductions ── -->
    <div class="section-card">
        <h6 class="fw-bold mb-1">💸 Deductions</h6>
        <p class="text-muted small mb-3">Saved deductions can be reused. One-time deductions are just for this report.</p>

        <!-- Saved deductions list -->
        <div id="saved-deductions-list" class="mb-3"></div>

        <!-- Add saved deduction form -->
        <div class="d-flex gap-2 mb-3 flex-wrap">
            <input type="text"   id="new-ded-name"   class="form-control form-control-sm" placeholder="Deduction name (e.g. Ingredients)" style="flex:2; min-width:140px;">
            <input type="number" id="new-ded-amount" class="form-control form-control-sm" placeholder="Default amount" style="flex:1; min-width:100px;" min="0">
            <button class="btn btn-sm btn-success" onclick="saveDeduction()">💾 Save</button>
        </div>

        <hr class="my-2">

        <!-- One-time deductions -->
        <p class="small fw-semibold mb-2">One-time deductions (this report only):</p>
        <div id="onetime-deductions"></div>
        <button class="btn btn-outline-secondary btn-sm mt-1" onclick="addOneTime()">+ Add one-time deduction</button>
    </div>

    <!-- ── Preview ── -->
    <div class="section-card" id="preview-section" style="display:none;">
        <h6 class="fw-bold mb-3">📊 Preview</h6>
        <div id="preview-content"></div>
    </div>

    <!-- ── Actions ── -->
    <div class="d-flex gap-3 justify-content-center flex-wrap">
        <button class="btn btn-primary px-4" onclick="previewReport()">👁 Preview</button>
        <button class="btn btn-danger px-4"  onclick="generatePDF()">⬇️ Download PDF</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Date helpers ──
function toISO(d) { return d.toISOString().split('T')[0]; }

function setRange(range) {
    const now = new Date();
    let from  = new Date(now);
    let to    = new Date(now);
    if (range === 'today') {
        // default — from = to = today
    } else if (range === 'week') {
        const day = now.getDay(); // 0=Sun
        from.setDate(now.getDate() - day);
    } else if (range === 'month') {
        from = new Date(now.getFullYear(), now.getMonth(), 1);
    } else if (range === 'last30') {
        from.setDate(now.getDate() - 29);
    }
    document.getElementById('dateFrom').value = toISO(from);
    document.getElementById('dateTo').value   = toISO(to);
}

// Default to today on load
setRange('today');

// ── Saved deductions (from DB) ──
let savedDeductions = [];  // [{id, name, default_amount, current_amount}]

async function loadSavedDeductions() {
    const res  = await fetch('/api/deductions');
    const data = await res.json();
    savedDeductions = data.map(d => ({...d, current_amount: d.default_amount}));
    renderSavedDeductions();
}

function renderSavedDeductions() {
    const container = document.getElementById('saved-deductions-list');
    if (!savedDeductions.length) {
        container.innerHTML = '<p class="text-muted small">No saved deductions yet.</p>';
        return;
    }
    container.innerHTML = savedDeductions.map((d, i) => `
        <div class="deduction-row" id="saved-row-${d.id}">
            <span class="badge-saved">saved</span>
            <input type="text" class="form-control form-control-sm" value="${escHtml(d.name)}" disabled style="flex:2;">
            <input type="number" class="form-control form-control-sm saved-ded-amount"
                   data-id="${d.id}" value="${d.current_amount}" min="0" style="flex:1; max-width:120px;"
                   oninput="updateSavedAmount(${d.id}, this.value)">
            <button class="btn btn-sm btn-outline-danger" onclick="deleteSavedDeduction(${d.id})">🗑</button>
        </div>
    `).join('');
}

function updateSavedAmount(id, val) {
    const d = savedDeductions.find(x => x.id === id);
    if (d) d.current_amount = parseFloat(val) || 0;
}

async function saveDeduction() {
    const name   = document.getElementById('new-ded-name').value.trim();
    const amount = parseFloat(document.getElementById('new-ded-amount').value) || 0;
    if (!name) { alert('Please enter a deduction name.'); return; }

    const res = await fetch('/api/deductions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, default_amount: amount})
    });
    if (res.ok) {
        document.getElementById('new-ded-name').value   = '';
        document.getElementById('new-ded-amount').value = '';
        await loadSavedDeductions();
    }
}

async function deleteSavedDeduction(id) {
    if (!confirm('Remove this saved deduction?')) return;
    await fetch(`/api/deductions/${id}`, {method: 'DELETE'});
    savedDeductions = savedDeductions.filter(d => d.id !== id);
    renderSavedDeductions();
}

// ── One-time deductions ──
let oneTimeDeductions = [];

function addOneTime() {
    oneTimeDeductions.push({name: '', amount: 0});
    renderOneTimes();
}

function renderOneTimes() {
    const container = document.getElementById('onetime-deductions');
    container.innerHTML = oneTimeDeductions.map((d, i) => `
        <div class="deduction-row">
            <span class="badge-temp">one-time</span>
            <input type="text" class="form-control form-control-sm" placeholder="Description"
                   value="${escHtml(d.name)}" oninput="oneTimeDeductions[${i}].name = this.value" style="flex:2;">
            <input type="number" class="form-control form-control-sm" placeholder="Amount"
                   value="${d.amount || ''}" min="0" oninput="oneTimeDeductions[${i}].amount = parseFloat(this.value)||0"
                   style="flex:1; max-width:120px;">
            <button class="btn btn-sm btn-outline-danger" onclick="removeOneTime(${i})">✕</button>
        </div>
    `).join('');
}

function removeOneTime(i) {
    oneTimeDeductions.splice(i, 1);
    renderOneTimes();
}

// ── Collect all deductions for report ──
function getAllDeductions() {
    const all = [];
    savedDeductions.forEach(d => {
        all.push({name: d.name, amount: d.current_amount});
    });
    oneTimeDeductions.forEach(d => {
        if (d.name && d.amount > 0) all.push({name: d.name, amount: d.amount});
    });
    return all;
}

function getDateRange() {
    return {
        date_from: document.getElementById('dateFrom').value,
        date_to:   document.getElementById('dateTo').value
    };
}

// ── Preview ──
async function previewReport() {
    const {date_from, date_to} = getDateRange();
    if (!date_from || !date_to) { alert('Please select a date range.'); return; }

    const res  = await fetch('/api/payments');
    const data = await res.json();

    const deductions    = getAllDeductions();
    const totalDed      = deductions.reduce((s, d) => s + d.amount, 0);

    // Filter payments by date range (client-side rough preview)
    const from = new Date(date_from + 'T00:00:00+03:00');
    const to   = new Date(date_to   + 'T23:59:59+03:00');

    let cashTotal=0, tillTotal=0, phoneTotal=0, pendingTotal=0;
    data.payments.forEach(p => {
        // We can't filter by date client-side without created_at in API — show totals note
    });

    const totalConfirmed = data.payments
        .filter(p => p.status === 'Confirmed')
        .reduce((s, p) => s + parseFloat(p.amount.replace(/,/g, '')), 0);

    const profit = totalConfirmed - totalDed;

    document.getElementById('preview-section').style.display = 'block';
    document.getElementById('preview-content').innerHTML = `
        <div class="alert alert-info small mb-3">
            Preview shows <strong>all confirmed payments</strong>. 
            The downloaded PDF will filter exactly to your selected date range.
        </div>
        <div class="preview-section">
            <strong>Period:</strong> ${date_from} → ${date_to}
        </div>
        <div class="preview-section">
            <strong>Total Confirmed Sales:</strong> KES ${fmt(totalConfirmed)}<br>
        </div>
        ${deductions.length ? `
        <div class="preview-section">
            <strong>Deductions:</strong><br>
            ${deductions.map(d => `&nbsp;&nbsp;• ${escHtml(d.name)}: KES ${fmt(d.amount)}`).join('<br>')}
            <br><strong>Total Deductions: KES ${fmt(totalDed)}</strong>
        </div>` : ''}
        <div class="profit-box ${profit < 0 ? 'loss' : ''}">
            <span style="font-size:1.1rem; font-weight:bold;">
                Net Profit: KES ${fmt(profit)}
            </span>
        </div>
    `;
    document.getElementById('preview-section').scrollIntoView({behavior: 'smooth'});
}

// ── Generate PDF ──
async function generatePDF() {
    const {date_from, date_to} = getDateRange();
    if (!date_from || !date_to) { alert('Please select a date range.'); return; }

    document.getElementById('loadingOverlay').classList.add('show');

    try {
        const res = await fetch('/generate-pdf', {
            method:  'POST',
            headers: {'Content-Type': 'application/json'},
            body:    JSON.stringify({
                date_from,
                date_to,
                deductions: getAllDeductions()
            })
        });

        if (!res.ok) {
            const err = await res.json();
            alert('Error: ' + (err.error || 'Failed to generate PDF'));
            return;
        }

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `FedhaFlow_Report_${date_from}_${date_to}.pdf`;
        a.click();
        URL.revokeObjectURL(url);
    } finally {
        document.getElementById('loadingOverlay').classList.remove('show');
    }
}

// ── Utils ──
function fmt(v)      { return Number(v).toLocaleString('en-KE', {minimumFractionDigits:0, maximumFractionDigits:2}); }
function escHtml(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
loadSavedDeductions();
</script>
</body>
</html>
